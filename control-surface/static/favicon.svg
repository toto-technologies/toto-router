  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#g)"/>
  <g fill="rgba(0,0,0,0.35)">
    <rect x="8" y="9.5" width="16" height="1.5" rx="0.75"/>
    <rect x="8" y="13.5" width="16" height="1.5" rx="0.75"/>
    <rect x="8" y="17.5" width="16" height="1.5" rx="0.75"/>
    <rect x="8" y="21.5" width="16" height="1.5" rx="0.75"/>
