<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
  %sveltekit.head%
  <script>
    /* Stamp theme + re-apply saved typography BEFORE first paint — no flash.
       Ported verbatim from the a-forest mockup: light default, forest-dark only if chosen. */
    (function () {
      var t = null;
      try { t = localStorage.getItem('toto-theme'); } catch (e) {}
      document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      try {
        var tn = JSON.parse(localStorage.getItem('toto-tuning') || '{}');
        for (var k in tn) { document.documentElement.style.setProperty(k, tn[k]); }
      } catch (e) {}
    })();
  </script>
  <script>
    /* Seamless launch (OSS token gate): a `#token=…` fragment carries the operator token from the
       boot URL. Apply it to the cookie the gateway reads and strip it from the URL — synchronously,
       BEFORE the SPA hydrates and fires its identity probe, so the app lands signed-in. Harmless in
       any edition: a non-matching cookie simply doesn't authenticate. */
    (function () {
      var m = /[#&]token=([^&]+)/.exec(location.hash || '');
      if (!m) return;
      document.cookie = 'toto_operator=' + decodeURIComponent(m[1]) + '; path=/; SameSite=Lax';
      history.replaceState(null, '', location.pathname + location.search);
    })();
  </script>
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
