# Anthropic direct-API provider fragment — a self-contained catalog OVERLAY, not a standalone
# environment catalog. Compose it onto a base with
# TOTO_GW_CATALOG="catalog.openrouter.yaml,catalog.anthropic.yaml" (Catalog.load merges
# comma-separated files left-to-right; later files extend/override by id). These rows previously
# lived inside catalog.directlabs.yaml; per the fragment rule (no provider's models inside
# another provider's file) Anthropic now owns its own fragment, like Cloudflare and Fireworks.
#
# Surface: the NATIVE Anthropic Messages API (endpoint=anthropic → the FrontierRunner adapter,
# which translates OpenAI-shaped requests to Messages calls and maps usage/cache fields back).
# Deliberately NOT Anthropic's OpenAI-compat wire: the native adapter already ships, carries
# first-party prompt-cache accounting (cache_read/cache_write token fields), and is what
# catalog.yaml's claude-sonnet-4.6 row has always used. The anthropic SDK authenticates with
# ANTHROPIC_API_KEY (sent as the x-api-key header + anthropic-version — pinned by
# tests/test_anthropic_provider.py); a key stored in the console's Provider connections rides
# the same byok overlay as every other provider and wins over the env var.
#
# Prices/ids/context: platform.claude.com pricing + models overview (re-verified against the
# claude-api reference, 2026-07-21), converted from $/1M to $/1k. Cache: 5-min write = 1.25x
# input, read = 0.1x (the Price default) — write premium set explicitly per house rule.

models:
  # Sonnet 5 direct: $2/$10 per 1M (introductory rate through 2026-08-31; list $3/$15), 1M ctx —
  # the native-endpoint sibling of or-sonnet-5. Exists so the driver/companion defaults can run
  # first-party instead of through OpenRouter (ToS §7(4) exposure — see provider-tos memory /
  # lawyer list, 2026-07-14). Same price as the OR route; first-party cache mechanics.
  - id: claude-sonnet-5
    lane: frontier
    endpoint: anthropic
    api_key_env: ANTHROPIC_API_KEY
    residency_class: cloud
    price_usd_per_1k: { prompt: 0.002, completion: 0.010, cache_write_multiplier: 1.25 }
    context_window: 1000000
    upstream_model: claude-sonnet-5

  # Current Opus: $5/$25 per 1M, 1M ctx, 128k out.
  - id: claude-opus-4.8
    lane: frontier
    endpoint: anthropic
    api_key_env: ANTHROPIC_API_KEY
    residency_class: cloud
    price_usd_per_1k: { prompt: 0.005, completion: 0.025, cache_write_multiplier: 1.25 }
    context_window: 1000000
    upstream_model: claude-opus-4-8

  # Fastest current Claude: $1/$5 per 1M, 200k ctx, 64k out. Direct sibling of or-haiku-4.5
  # (same price via OpenRouter, but this is the native endpoint + first-party cache mechanics).
  - id: claude-haiku-4.5
    lane: economy
    endpoint: anthropic
    api_key_env: ANTHROPIC_API_KEY
    residency_class: cloud
    price_usd_per_1k: { prompt: 0.001, completion: 0.005, cache_write_multiplier: 1.25 }
    context_window: 200000
    upstream_model: claude-haiku-4-5
